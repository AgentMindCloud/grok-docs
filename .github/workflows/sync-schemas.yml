name: Sync JSON Schemas from Spec Repo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    paths:
      - '.github/workflows/sync-schemas.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout grok-docs
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: agentmindcloud/grok-yaml-standards
          path: spec-repo
          ref: main

      - name: Read spec version
        id: spec
        run: |
          if [ -f spec-repo/VERSION ]; then
            VERSION=$(cat spec-repo/VERSION | tr -d '[:space:]')
          else
            VERSION=$(grep -E '"?version"?\s*:' spec-repo/schemas/*.json 2>/dev/null \
              | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "latest")
          fi
          echo "version=${VERSION:-latest}" >> "$GITHUB_OUTPUT"

      - name: Sync schemas into docs/assets/schemas
        run: |
          VERSION="${{ steps.spec.outputs.version }}"
          SPEC_SCHEMAS="spec-repo/schemas"

          # 'latest/' always mirrors the current top of the spec repo (today: v2.13).
          mkdir -p docs/assets/schemas/latest
          rm -f docs/assets/schemas/latest/*.json
          if compgen -G "${SPEC_SCHEMAS}/*.json" > /dev/null; then
            cp ${SPEC_SCHEMAS}/*.json docs/assets/schemas/latest/
          fi

          # Versioned mirror (e.g. v2.13/) — pinned copy of the current spec.
          # Never overwrite v2.12/ — it is frozen and lives in the repo.
          if [ "$VERSION" != "latest" ] && [ "$VERSION" != "2.12" ] && [ "$VERSION" != "v2.12" ]; then
            VDIR="docs/assets/schemas/v${VERSION#v}"
            mkdir -p "$VDIR"
            rm -f "$VDIR"/*.json
            if compgen -G "${SPEC_SCHEMAS}/*.json" > /dev/null; then
              cp ${SPEC_SCHEMAS}/*.json "$VDIR/"
            fi
          fi

          # v2.13 explicit mirror — if the upstream repo ships a schemas/v2.13 dir.
          if [ -d "${SPEC_SCHEMAS}/v2.13" ]; then
            mkdir -p docs/assets/schemas/v2.13
            rm -f docs/assets/schemas/v2.13/*.json
            cp ${SPEC_SCHEMAS}/v2.13/*.json docs/assets/schemas/v2.13/ 2>/dev/null || true
          fi

          # v2.14 explicit mirror — additive grok-visuals schema lives in a subdir
          # upstream. Only sync when it exists; do not clobber a local copy otherwise.
          if [ -d "${SPEC_SCHEMAS}/v2.14" ]; then
            mkdir -p docs/assets/schemas/v2.14
            # Keep any local files that the upstream does not ship.
            for f in ${SPEC_SCHEMAS}/v2.14/*.json; do
              [ -e "$f" ] || continue
              cp "$f" docs/assets/schemas/v2.14/
            done
          fi

      - name: Commit & push
        run: |
          git config user.name  "Schema Bot"
          git config user.email "bot@agentmindcloud.dev"
          git add docs/assets/schemas/
          if git diff --cached --quiet; then
            echo "No schema changes."
          else
            git commit -m "chore(schemas): sync from grok-yaml-standards@${{ steps.spec.outputs.version }}"
            git push
          fi
