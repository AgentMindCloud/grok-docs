name: Link check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  schedule:
    - cron: '0 6 * * 1'   # Monday morning
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --exclude-path .git
            --exclude 'localhost'
            --exclude 'example.com'
            docs/**/*.md
          fail: true
